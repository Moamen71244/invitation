<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engagement Invitation</title>
    <style>
      :root {
        --bg-start: #fbf8f3;
        --bg-end: #f3ece3;
        --card: #fffdf9;
        --primary: #7b5e57;
        --text: #3f3a37;
        --muted: #7d7570;
        --line: #e8ded3;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(
          180deg,
          var(--bg-start) 0%,
          var(--bg-end) 100%
        );
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
      }

      .full-screen-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
      }

      .section-content {
        width: 100%;
        max-width: 680px;
        padding: 8px 12px;
        text-align: center;
      }

      .small {
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 10px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.7rem, 7vw, 2.2rem);
        line-height: 1.2;
        color: var(--primary);
        font-weight: 600;
      }

      .divider {
        width: 72px;
        height: 2px;
        background: var(--line);
        margin: 16px auto 14px;
      }

      .message {
        margin: 0 auto 16px;
        line-height: 1.75;
        font-size: 0.98rem;
        color: var(--text);
      }

      .plain-details {
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        text-align: center;
      }

      .plain-item {
        margin-top: 16px;
      }

      .plain-label {
        margin: 0;
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .plain-value {
        margin: 7px 0 0;
        font-size: 1.16rem;
        color: var(--primary);
        font-weight: 600;
        line-height: 1.4;
      }

      .venue-link {
        color: var(--primary);
        text-decoration: none;
        border-bottom: 1px dashed rgba(123, 94, 87, 0.5);
        padding-bottom: 1px;
        word-break: break-word;
      }

      .venue-link:hover {
        opacity: 0.85;
      }

      .footer {
        margin-top: 20px;
        font-size: 0.9rem;
        color: var(--muted);
        line-height: 1.65;
      }

      .first-photo {
        margin-top: 12px;
        width: 100%;
        max-width: 300px;
        border-radius: 12px;
        display: block;
        margin-left: auto;
        margin-right: auto;
        object-fit: cover;
        background: #f6efe7;
      }

      .slider {
        position: relative;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #f6efe7;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
      }

      .slide-image {
        display: block;
        width: 100%;
        height: 280px;
        object-fit: cover;
      }

      .slider-controls {
        position: absolute;
        inset: auto 0 10px 0;
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.72);
        padding: 0;
        cursor: pointer;
      }

      .dot.active {
        background: #7b5e57;
      }

      .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 0;
        background: rgba(255, 253, 249, 0.9);
        color: #7b5e57;
        font-size: 18px;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .nav-btn.left {
        left: 8px;
      }

      .nav-btn.right {
        right: 8px;
      }

      .circles-section {
        width: 100%;
        max-width: 680px;
        margin: 0 auto;
        text-align: center;
        position: relative;
        padding: 8px 0;
      }

      .circles-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: nowrap;
      }

      .time-circle {
        width: 102px;
        height: 102px;
        border-radius: 50%;
        border: 2px solid #dbcbbc;
        background: radial-gradient(
          circle at 30% 25%,
          #fffdf9 0%,
          #f5e8dc 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transform: scale(0.86);
        opacity: 0.35;
        transition:
          transform 0.55s ease,
          opacity 0.55s ease,
          box-shadow 0.55s ease;
      }

      .time-circle.active {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 10px 24px rgba(123, 94, 87, 0.2);
      }

      .circle-value {
        font-size: 1.24rem;
        font-weight: 700;
        color: var(--primary);
        line-height: 1;
      }

      .circle-label {
        margin-top: 6px;
        font-size: 0.66rem;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        line-height: 1;
      }

      .petals {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .petal {
        position: absolute;
        top: -12%;
        width: 18px;
        height: 12px;
        border-radius: 60% 40% 60% 40%;
        background: rgba(217, 129, 153, 0.88);
        opacity: 0;
        animation: fall 3.2s linear infinite;
      }

      .petal:nth-child(odd) {
        background: rgba(241, 176, 191, 0.9);
      }

      @keyframes fall {
        0% {
          transform: translateY(0) translateX(0) rotate(0deg);
          opacity: 0;
        }
        15% {
          opacity: 0.95;
        }
        100% {
          transform: translateY(360px) translateX(28px) rotate(320deg);
          opacity: 0;
        }
      }

      .intro-screen {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .envelope-wrap {
        width: min(92vw, 380px);
        perspective: 900px;
        text-align: center;
      }

      .envelope {
        position: relative;
        width: 100%;
        height: 230px;
        border-radius: 16px;
        border: 1px solid #dccdc0;
        background: linear-gradient(180deg, #fffaf4 0%, #f2e5d8 100%);
        box-shadow: 0 14px 30px rgba(85, 62, 45, 0.16);
        overflow: hidden;
      }

      .flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 55%;
        background: linear-gradient(180deg, #f6e9dc 0%, #ebd8c7 100%);
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        transform-origin: top center;
        transition: transform 1s ease;
        z-index: 3;
      }

      .letter {
        position: absolute;
        left: 12%;
        bottom: 12px;
        width: 76%;
        height: 72%;
        border-radius: 12px;
        border: 1px solid #e3d5c8;
        background: #fffdf9;
        display: grid;
        place-items: center;
        color: var(--primary);
        font-weight: 600;
        transform: translateY(0);
        transition: transform 1s ease;
        z-index: 2;
      }

      .envelope.open .flap {
        transform: rotateX(170deg);
      }

      .envelope.open .letter {
        transform: translateY(-36px);
      }

      .open-btn {
        margin-top: 16px;
        border: 0;
        border-radius: 999px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #7b5e57 0%, #9e786d 100%);
        color: #fffdf9;
        font-size: 0.95rem;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(82, 70, 62, 0.28);
      }

      .blur-flash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          circle at center,
          rgba(255, 250, 245, 0.96) 0%,
          rgba(255, 248, 240, 0.86) 40%,
          rgba(255, 245, 236, 0) 72%
        );
        backdrop-filter: blur(0px);
        transition:
          opacity 0.45s ease,
          backdrop-filter 0.7s ease;
        z-index: 50;
      }

      .blur-flash.active {
        opacity: 1;
        backdrop-filter: blur(13px);
      }

      .main-page {
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 0.9s ease,
          transform 0.9s ease;
      }

      .main-page.ready {
        opacity: 1;
        transform: translateY(0);
      }

      .enter-left,
      .enter-right {
        opacity: 0;
      }

      .main-page.ready .enter-left {
        animation: slideInLeft 0.85s ease forwards;
      }

      .main-page.ready .enter-right {
        animation: slideInRight 0.85s ease forwards;
      }

      .delay-1 {
        animation-delay: 0.08s !important;
      }
      .delay-2 {
        animation-delay: 0.18s !important;
      }
      .delay-3 {
        animation-delay: 0.28s !important;
      }
      .delay-4 {
        animation-delay: 0.38s !important;
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-42px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(42px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .confetti-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        overflow: hidden;
      }

      .confetti-piece {
        position: absolute;
        top: -20px;
        opacity: 0;
        animation: burstConfetti linear forwards;
      }

      @keyframes burstConfetti {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        60% {
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(var(--rotation));
          opacity: 0;
        }
      }

      .flap-flower {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 28px;
        z-index: 4;
        pointer-events: none;
      }

      .scroll-btn {
        margin-top: 24px;
        padding: 10px 24px;
        border: 1px solid var(--primary);
        background: transparent;
        color: var(--primary);
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-left: auto;
        margin-right: auto;
      }

      .scroll-btn:hover {
        background: var(--primary);
        color: #fff;
      }

      .location-btn {
        display: inline-block;
        margin-top: 8px;
        padding: 8px 20px;
        background: linear-gradient(135deg, #7b5e57 0%, #9e786d 100%);
        color: #fffdf9 !important;
        border-radius: 999px;
        text-decoration: none;
        font-size: 0.95rem;
        border: none;
        box-shadow: 0 4px 12px rgba(82, 70, 62, 0.2);
      }

      @media (min-width: 768px) {
        .section-content {
          padding: 10px 18px;
        }

        .full-screen-section {
          padding: 18px 24px;
        }

        .slider {
          max-width: 680px;
        }

        .small {
          font-size: 0.92rem;
        }

        .title {
          font-size: clamp(2.2rem, 5vw, 3rem);
        }

        .plain-value {
          font-size: 1.34rem;
        }

        .footer {
          font-size: 0.96rem;
        }

        .slide-image {
          height: 420px;
        }

        .envelope {
          height: 260px;
        }

        .time-circle {
          width: 132px;
          height: 132px;
        }

        .circle-value {
          font-size: 1.56rem;
        }

        .circle-label {
          font-size: 0.74rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <script>
      const e = React.createElement;
      const { useState, useEffect, useRef } = React;

      function IntroScreen(props) {
        return e(
          "div",
          { className: "intro-screen" },
          e(
            "div",
            { className: "envelope-wrap" },
            e(
              "div",
              { className: "envelope" + (props.isOpening ? " open" : "") },
              e(
                "div",
                { className: "flap" },
                e("div", { className: "flap-flower" }, ""),
              ),
              e("div", { className: "letter" }, "Engagement Invitation"),
            ),
            e(
              "button",
              { className: "open-btn", type: "button", onClick: props.onOpen },
              props.isOpening ? "Opening..." : "Open Invitation",
            ),
          ),
        );
      }

      function CelebrationAnimation() {
        const [burstId, setBurstId] = useState(0);

        useEffect(function () {
          const intervalId = setInterval(function () {
            setBurstId(function (b) {
              return b + 1;
            });
          }, 6000); // 6 seconds
          return function () {
            clearInterval(intervalId);
          };
        }, []);

        const confettiCount = 45;

        return e(
          "div",
          { className: "confetti-overlay", key: burstId },
          Array.from({ length: confettiCount }).map(function (_, i) {
            const isCircle = Math.random() > 0.5;
            const left = Math.random() * 100;
            const duration = 2.5 + Math.random() * 2.5;
            const delay = Math.random() * 0.5;
            const colors = [
              "#d98199",
              "#7b5e57",
              "#dccdc0",
              "#f1b0bf",
              "#e8ded3",
            ];
            const bg = colors[Math.floor(Math.random() * colors.length)];
            const rotate = Math.floor(Math.random() * 360) + 360;
            return e("div", {
              key: i,
              className: "confetti-piece",
              style: {
                left: left + "vw",
                backgroundColor: bg,
                animationDuration: duration + "s",
                animationDelay: delay + "s",
                borderRadius: isCircle ? "50%" : "2px",
                width: isCircle ? "10px" : "8px",
                height: isCircle ? "10px" : "16px",
                "--rotation": (Math.random() > 0.5 ? rotate : -rotate) + "deg",
              },
            });
          }),
        );
      }

      function EventCirclesSection() {
        const [opened, setOpened] = useState(0);
        const [started, setStarted] = useState(false);
        const sectionRef = useRef(null);
        const petals = [10, 22, 34, 46, 58, 70, 82, 94];

        useEffect(function () {
          if (!sectionRef.current) return;
          const observer = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  setStarted(true);
                  observer.disconnect();
                }
              });
            },
            { threshold: 0.35 },
          );
          observer.observe(sectionRef.current);
          return function () {
            observer.disconnect();
          };
        }, []);

        useEffect(
          function () {
            if (!started) return;
            const t1 = window.setTimeout(function () {
              setOpened(1);
            }, 200);
            const t2 = window.setTimeout(function () {
              setOpened(2);
            }, 760);
            const t3 = window.setTimeout(function () {
              setOpened(3);
            }, 1320);
            return function () {
              window.clearTimeout(t1);
              window.clearTimeout(t2);
              window.clearTimeout(t3);
            };
          },
          [started],
        );

        return e(
          "section",
          { className: "circles-section", ref: sectionRef },
          e(
            "p",
            { className: "small", style: { marginBottom: 16 } },
            "Save The Time",
          ),
          e(
            "div",
            { className: "circles-row" },
            e(
              "div",
              { className: "time-circle" + (opened >= 1 ? " active" : "") },
              e("span", { className: "circle-value" }, "25"),
              e("span", { className: "circle-label" }, "Day"),
            ),
            e(
              "div",
              { className: "time-circle" + (opened >= 2 ? " active" : "") },
              e("span", { className: "circle-value" }, "June"),
              e("span", { className: "circle-label" }, "Month"),
            ),
            e(
              "div",
              { className: "time-circle" + (opened >= 3 ? " active" : "") },
              e("span", { className: "circle-value" }, "7:30"),
              e("span", { className: "circle-label" }, "Hour"),
            ),
          ),
          opened >= 3
            ? e(
                "div",
                { className: "petals" },
                petals.map(function (left, i) {
                  return e("span", {
                    key: i,
                    className: "petal",
                    style: {
                      left: left + "%",
                      animationDelay: i * 0.24 + "s",
                    },
                  });
                }),
              )
            : null,
        );
      }

      function InvitationCard() {
        return e(
          React.Fragment,
          null,
          e(
            "section",
            { className: "full-screen-section" },
            e(
              "main",
              { className: "section-content" },
              e("p", { className: "small enter-left" }, "Private Invite"),
              e(
                "h1",
                { className: "title enter-right delay-1" },
                "You are invited to our engagement party",
              ),
              e("div", { className: "divider enter-left delay-2" }),
              e(
                "p",
                { className: "message enter-right delay-2" },
                "With hearts full of joy, we would love to celebrate this special day with you.",
              ),
              e("img", {
                className: "first-photo enter-left delay-3",
                src: "Gemini_Generated_Image_oim6x0oim6x0oim6.png",
                alt: "Moamen and Farah",
                loading: "eager",
              }),
              e(
                "button",
                {
                  className: "scroll-btn enter-right delay-4",
                  onClick: function () {
                    // We find the parent's next sibling (which is the next section) and scroll into view
                    var nextSection = document
                      .querySelector(".circles-section")
                      .closest(".full-screen-section");
                    if (nextSection) {
                      nextSection.scrollIntoView({ behavior: "smooth" });
                    } else {
                      window.scrollBy({
                        top: window.innerHeight,
                        behavior: "smooth",
                      });
                    }
                  },
                },
                "↓ Scroll Down",
              ),
            ),
          ),
          e(
            "section",
            { className: "full-screen-section" },
            e(
              "div",
              { className: "enter-right delay-1", style: { width: "100%" } },
              e(EventCirclesSection),
            ),
          ),
          e(
            "section",
            { className: "full-screen-section" },
            e(
              "main",
              { className: "section-content" },
              e("p", { className: "small enter-left" }, "Event Details"),
              e("div", { className: "divider enter-right delay-1" }),
              e(
                "div",
                { className: "plain-details" },
                e(
                  "div",
                  { className: "plain-item enter-left delay-1" },
                  e("p", { className: "plain-label" }, "Date"),
                  e("p", { className: "plain-value" }, "25/6/2026"),
                ),
                e(
                  "div",
                  { className: "plain-item enter-right delay-2" },
                  e("p", { className: "plain-label" }, "Time"),
                  e("p", { className: "plain-value" }, "7:30 PM"),
                ),
                e(
                  "div",
                  { className: "plain-item enter-left delay-3" },
                  e("p", { className: "plain-label" }, "Location"),
                  e(
                    "p",
                    { className: "plain-value" },
                    e(
                      "a",
                      {
                        className: "location-btn",
                        href: "https://maps.app.goo.gl/Dnz1zMYrvzsw6N9C7",
                        target: "_blank",
                        rel: "noopener noreferrer",
                      },
                      "Open Location",
                    ),
                  ),
                ),
              ),
              e(
                "p",
                { className: "footer enter-left delay-4" },
                "We are waiting to celebrate with you.",
              ),
            ),
          ),
        );
      }

      function App() {
        const [phase, setPhase] = useState("intro");
        const audioRef = useRef(null);
        const timersRef = useRef([]);
        const volumeIntervalRef = useRef(null);

        useEffect(function () {
          return function () {
            timersRef.current.forEach(function (id) {
              window.clearTimeout(id);
            });
            if (volumeIntervalRef.current) {
              window.clearInterval(volumeIntervalRef.current);
            }
          };
        }, []);

        function startIntroSequence() {
          if (phase !== "intro") return;
          setPhase("opening");

          const audio = audioRef.current;
          if (audio) {
            try {
              audio.currentTime = 30;
            } catch (err) {}
            audio.volume = 0.08;
            const playPromise = audio.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(function () {});
            }
            volumeIntervalRef.current = window.setInterval(function () {
              if (!audioRef.current) return;
              const next = Math.min(audioRef.current.volume + 0.04, 0.95);
              audioRef.current.volume = next;
              if (next >= 0.95 && volumeIntervalRef.current) {
                window.clearInterval(volumeIntervalRef.current);
                volumeIntervalRef.current = null;
              }
            }, 260);
          }

          timersRef.current.push(
            window.setTimeout(function () {
              setPhase("revealing");
            }, 1100),
          );

          timersRef.current.push(
            window.setTimeout(function () {
              setPhase("ready");
            }, 2100),
          );
        }

        return e(
          React.Fragment,
          null,
          e("audio", {
            ref: audioRef,
            src: "https://serv100.albumaty.com/dl/mem/mnw3at/albums/afrahna/08_-_Ya_Deblt_El5toba.mp3",
            loop: true,
            preload: "auto",
          }),
          e("div", {
            className: "blur-flash" + (phase === "opening" ? " active" : ""),
          }),
          phase === "intro" || phase === "opening"
            ? e(IntroScreen, {
                isOpening: phase === "opening",
                onOpen: startIntroSequence,
              })
            : null,
          phase === "revealing" || phase === "ready"
            ? e(
                "div",
                {
                  className: "main-page" + (phase === "ready" ? " ready" : ""),
                },
                e(InvitationCard),
                phase === "ready" ? e(CelebrationAnimation) : null,
              )
            : null,
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
  </body>
</html>
